server:
  port: 25800
  address: 0.0.0.0

spring:
  main:
    web-application-type: reactive

  redis:
    host: 192.168.136.129
    port: 6379
    password: 123456
    database: 1
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
        max-wait: 1000ms


  rabbitmq:
    host: 192.168.136.129
    port: 5672
    username: root
    password: 123456
    virtual-host: /


  cloud:
    loadbalancer:
      nacos:
        enabled: true


    gateway:
      routes:
        # 1. 用户登录 (密码)
        - id: auth_login
          uri: lb://user-service
          predicates:
            - Path=/api/auth/login
            - Method=POST
          filters:
            - RewritePath=/api/auth/login, /auth/login
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipKeyResolver}"
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10

        # 2. 用户登录 (手机号)
        - id: auth_login_phone
          uri: lb://user-service
          predicates:
            - Path=/api/auth/login/phone
            - Method=POST
          filters:
            - RewritePath=/api/auth/login/phone, /auth/loginByPhone
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipKeyResolver}"
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10

        # 3. 刷新令牌 (Token Refresh)
        - id: auth_refresh
          uri: lb://user-service
          predicates:
            - Path=/api/auth/refresh
            - Method=POST
          filters:
            - RewritePath=/api/auth/refresh, /auth/refresh
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipKeyResolver}"
                # 刷新 Token 频率不宜过高
                redis-rate-limiter.replenishRate: 2
                redis-rate-limiter.burstCapacity: 5

        # 4. 用户登出 (Logout)
        - id: auth_logout
          uri: lb://user-service
          predicates:
            - Path=/api/auth/logout
            - Method=POST
          filters:
            - RewritePath=/api/auth/logout, /auth/logout
            - name: RequestRateLimiter
              args:
                # 登出通常针对已登录用户，建议按 UserID 限流防止恶意刷接口
                key-resolver: "#{@userKeyResolver}"
                redis-rate-limiter.replenishRate: 2
                redis-rate-limiter.burstCapacity: 5

        # 5. 发送验证码 (高危接口，严格限流)
        - id: sms_send
          uri: lb://sms-service
          predicates:
            - Path=/api/sms/codes
            - Method=POST
          filters:
            - RewritePath=/api/sms/codes, /sms/send
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipKeyResolver}"
                redis-rate-limiter.replenishRate: 1 # 每秒1个，防止短信轰炸
                redis-rate-limiter.burstCapacity: 1

        # 6. 用户注册
        - id: user_register
          uri: lb://user-service
          predicates:
            - Path=/api/users
            - Method=POST
          filters:
            - RewritePath=/api/users, /user/register
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipKeyResolver}"
                redis-rate-limiter.replenishRate: 3
                redis-rate-limiter.burstCapacity: 5

        # 7. 修改手机号
        - id: user_reset_phone
          uri: lb://user-service
          predicates:
            - Path=/api/users/phone
            - Method=PUT
          filters:
            - RewritePath=/api/users/phone, /user/resetPhone
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}" # 建议按用户限流
                redis-rate-limiter.replenishRate: 1
                redis-rate-limiter.burstCapacity: 2

        # 8. 找回密码
        - id: user_reset_password
          uri: lb://user-service
          predicates:
            - Path=/api/users/password
            - Method=PUT
          filters:
            - RewritePath=/api/users/password, /user/resetPass
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipKeyResolver}"
                redis-rate-limiter.replenishRate: 1
                redis-rate-limiter.burstCapacity: 3

        # 9. 获取某租户下的所有用户
        - id: tenant_get_users
          uri: lb://user-service
          predicates:
            - Path=/api/tenants/users
            - Method=GET
          filters:
            - RewritePath=/api/tenants/users, /user/getUsers
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@tenantKeyResolver}"
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 50






        # 1. 获取用户资料
        - id: user_get_profile
          uri: lb://user-service
          predicates:
            - Path=/api/users/profile
            - Method=GET
          filters:
            - RewritePath=/api/users/profile, /prof/getProfile
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                redis-rate-limiter.replenishRate: 20  # 查询频率可以略高
                redis-rate-limiter.burstCapacity: 40

        # 2. 上传头像
        - id: user_upload_avatar
          uri: lb://user-service
          predicates:
            - Path=/api/users/profile/avatar
            - Method=POST
          filters:
            - RewritePath=/api/users/profile/avatar, /prof/uploadAvatar
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                redis-rate-limiter.replenishRate: 2   # 上传文件属于耗能操作，调低限流
                redis-rate-limiter.burstCapacity: 5

        # 3. 编辑用户资料
        - id: user_update_profile
          uri: lb://user-service
          predicates:
            - Path=/api/users/profile
            - Method=PUT
          filters:
            - RewritePath=/api/users/profile, /prof/editProfile
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10

        # 4. 获取用户通知
        - id: user_get_notifications
          uri: lb://user-service
          predicates:
            - Path=/api/users/notifications
            - Method=GET
          filters:
            - RewritePath=/api/users/notifications, /not/getNotifications
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20


        # 1. 获取当前租户信息
        - id: tenant_get_info
          uri: lb://user-service
          predicates:
            - Path=/api/tenants/info
            - Method=GET
          filters:
            - RewritePath=/api/tenants/info, /ten/getTenantInfo
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@tenantKeyResolver}"
                redis-rate-limiter.replenishRate: 50
                redis-rate-limiter.burstCapacity: 100

        # 2. 租户注册 (新租户创建)
        - id: tenant_register
          uri: lb://user-service
          predicates:
            - Path=/api/tenants
            - Method=POST
          filters:
            - RewritePath=/api/tenants, /ten/register
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipKeyResolver}" # 还没注册，按 IP 限流
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10

        # 3. 更改租户套餐
        - id: tenant_update_plan
          uri: lb://user-service
          predicates:
            - Path=/api/tenants/plan
            - Method=PUT
          filters:
            - RewritePath=/api/tenants/plan, /ten/tenantPlan
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@tenantKeyResolver}"
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10


        # 1. 发布帖子 (需要登录 + 用户限流)
        - id: forum_post_create
          uri: lb://forum-service
          predicates:
            - Path=/api/forum/post/create
            - Method=POST
          filters:
            - RewritePath=/api/forum/post/create, /post/uploadPost
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                redis-rate-limiter.replenishRate: 5
                redis-rate-limiter.burstCapacity: 10

        # 2. 删除帖子 (需要登录 + 角色校验建议在后端做)
        - id: forum_post_delete
          uri: lb://forum-service
          predicates:
            - Path=/api/forum/post/delete
            - Method=DELETE
          filters:
            - RewritePath=/api/forum/post/delete, /post/deletePost
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                redis-rate-limiter.replenishRate: 2
                redis-rate-limiter.burstCapacity: 5

        # 3. 获取所有帖子 (公共接口 + IP限流)
        - id: forum_post_list_all
          uri: lb://forum-service
          predicates:
            - Path=/api/forum/post/list
            - Method=GET
          filters:
            - RewritePath=/api/forum/post/list, /post/listPosts
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@ipKeyResolver}"
                redis-rate-limiter.replenishRate: 20
                redis-rate-limiter.burstCapacity: 40

        # 4. 按租户查询帖子 (租户限流)
        - id: forum_post_list_tenant
          uri: lb://forum-service
          predicates:
            - Path=/api/forum/post/tenant
            - Method=GET
          filters:
            - RewritePath=/api/forum/post/tenant, /post/listByTenant
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@tenantKeyResolver}"
                redis-rate-limiter.replenishRate: 30
                redis-rate-limiter.burstCapacity: 60

        # 5. 按用户查询自己发布的帖子 (用户限流)
        - id: forum_post_list_user
          uri: lb://forum-service
          predicates:
            - Path=/api/forum/post/user
            - Method=GET
          filters:
            - RewritePath=/api/forum/post/user, /post/listByUser
            - name: RequestRateLimiter
              args:
                key-resolver: "#{@userKeyResolver}"
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20





















        # 测试
        - id: test
          uri: lb://user-service
          predicates:
            - Path=/us/abc
            - Method=POST
          filters:
            - RewritePath=/us/abc, /user/test





logging:
  level:
    root: info
  # 日志输出格式控制
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"  # 控制台日志格式
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"  # 文件日志格式
  # 配置日志文件输出
  file:
    name: log/gateway/gatewayapplication.log       # 设置日志文件的输出路径
  logback:
    rollingpolicy:
      max-file-size: 10MB
      max-history: 30
